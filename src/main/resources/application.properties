spring.application.name=admin-service
server.port=8084

# ─── MySQL ───────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/admin_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Eureka Client ───────────────────────────────────────────────────────────
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8087/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Config Server (fallback na lokalne props ako nije dostupan)
spring.profiles.active=dev
spring.config.import=optional:configserver:http://localhost:8888

# Spring Cloud 2023.0.1 je kompatibilan sa Boot 3.2/3.3 ali radi i sa 3.5 uz ovaj flag
spring.cloud.compatibility-verifier.enabled=false

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.ba.unsa.etf=DEBUG